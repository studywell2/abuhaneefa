databases:
  - name: abu-aneefah-db
    databaseName: abu_aneefah
    user: abu_aneefah_user
    plan: free

services:
  - type: web
    name: abu-aneefah-academy
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_NAME
        value: "Abu Aneefah Islamic Academy"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: "base64:Ac9YMVK/ASVFvjRI8BDUlUzxEkAgu2IxOV1cOS+2n1E="
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: abu-aneefah-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: abu-aneefah-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: abu-aneefah-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: abu-aneefah-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: abu-aneefah-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
